<!doctype html>
<html lang="pt-br" class="dark">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="assets/icon/githubIcon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linktree</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300..700&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="min-h-screen bg-zinc-50 text-zinc-900 dark:bg-zinc-950 dark:text-zinc-50">
    <main class="desktop-zoom mx-auto max-w-md px-4 py-10">
      <div class="flex justify-end">
        <button
          id="themeToggle"
          class="inline-flex items-center rounded-xl border border-zinc-200 px-3 py-2 text-sm font-medium transition-colors hover:cursor-pointer hover:bg-zinc-100 dark:border-zinc-800 dark:hover:bg-zinc-900"
          type="button"
          aria-live="polite"
        >
            <img
              id="themeToggleIcon"
              class="w-4 object-contain"
              src="assets/icon/lightMode.png"
              alt=""
              aria-hidden="true"
            />
          <span id="themeToggleLabel">Modo claro</span>
        </button>
      </div>

      <header class="mt-4 flex items-center justify-center">
        <div class="flex flex-col items-center gap-4">
          <div
            class="h-32 w-32 overflow-hidden rounded-full ring-2 ring-zinc-200 dark:ring-zinc-800"
          >
            <img
              id="profileImage"
              class="h-full w-full object-cover object-[50%_35%]"
              src="assets/img/me.jpeg"
              data-light-src="assets/img/oliver.jpeg"
              data-dark-src="assets/img/me.jpeg"
              alt="Foto"
            />
          </div>
          <div class="flex flex-col items-center">
            <h1 class="text-xl font-semibold">Manoel Pedro</h1>
            <p class="text-sm text-zinc-500 dark:text-zinc-400">@manoelpedromn</p>
          </div>
        </div>
      </header>

      <section class="flex flex-col mt-8 space-y-3">
        <a
          class="flex items-center justify-center rounded-2xl bg-white p-4 font-medium shadow-sm ring-1 ring-zinc-200 hover:bg-zinc-50 dark:bg-zinc-900 dark:ring-zinc-800 dark:hover:bg-zinc-800"
          href="https://github.com/dyingsoldier"
          target="_blank"
          rel="noreferrer"
        >
          GitHub
        </a>

        <a
          class="flex items-center justify-center rounded-2xl bg-white p-4 font-medium shadow-sm ring-1 ring-zinc-200 hover:bg-zinc-50 dark:bg-zinc-900 dark:ring-zinc-800 dark:hover:bg-zinc-800"
          href="https://www.linkedin.com/in/manoelpedromn/"
          target="_blank"
          rel="noreferrer"
        >
          Linkedin
        </a>
        
        <a
          href="https://open.spotify.com/user/tydartz"
          target="_blank"
          class="flex justify-center mt-2"
        >
          <img
            id="spotifyIcon"
            src="assets/icon/spotify.png"
            data-light-src="assets/icon/spotifyBlack.png"
            data-dark-src="assets/icon/spotifyWhite.png"
            class="w-9"
            alt="icon do spotify"
          />
        </a>
      </section>
    </main>

    <script type="module" src="src/main.js"></script>
  </body>
</html>
